name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 10 minutes (Render sleeps after 15 mins of inactivity)
    - cron: '*/1 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://my-waha-api-wv3j.onrender.com/health > /dev/null
          echo "Ping sent at $(date)"